<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JMeter 管理平台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/static/app.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid px-4">
      <a class="navbar-brand" href="/">JMeter Console</a>
      <div class="d-flex align-items-center gap-3">
        {% if current_user %}
        <div class="navbar-nav">
          {% if can_drive_tests %}
          <a class="nav-link" href="/tests">測試驅動</a>
          {% endif %}
          <a class="nav-link" href="/configs">設定管理</a>
          <a class="nav-link" href="/projects">專案管理</a>
          <a class="nav-link" href="/datasets">Dataset</a>
          <a class="nav-link" href="/reports">報告</a>
          <a class="nav-link" href="/logs">Logs</a>
          {% if can_manage_users %}
          <a class="nav-link" href="/users">使用者管理</a>
          {% endif %}
        </div>
        <div class="text-light small">
          <span class="badge text-bg-secondary me-2">{{ current_user.group }}</span>
          {{ current_user.username }}
        </div>
        <a class="btn btn-sm btn-outline-light" href="/change-password">變更密碼</a>
        <form method="post" action="/logout" class="m-0">
          <button class="btn btn-sm btn-warning" type="submit">登出</button>
        </form>
        {% else %}
        <a class="btn btn-sm btn-outline-light" href="/login">登入</a>
        {% endif %}
      </div>
    </div>
  </nav>
  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
