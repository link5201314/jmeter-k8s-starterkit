{% extends "base.html" %}

{% block content %}
<div class="row g-4">
  <div class="col-12">
    <div class="card shadow-sm">
      <div class="card-header">環境選擇</div>
      <div class="card-body">
        <form id="config-load-form" class="row g-3 align-items-end">
          <div class="col-lg-5">
            <label class="form-label">環境</label>
            <select id="config-env" class="form-select" required>
              <option value="" disabled selected>-- 請選擇環境 --</option>
              {% for env in helm_envs %}
              <option value="{{ env }}">{{ env }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-lg-2">
            <button id="config-load-btn" type="submit" class="btn btn-primary w-100">讀取</button>
          </div>
          <div class="col-lg-5">
            <span id="config-current-env" class="badge text-bg-light">尚未鎖定環境</span>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="col-12 col-xl-6">
    <div class="card shadow-sm h-100">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span>Helm values 編輯</span>
        <span class="badge text-bg-light" data-env-badge>未選擇環境</span>
      </div>
      <div class="card-body">
        <div class="yaml-preview-wrapper mb-3">
          <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-2">
            <span class="fw-semibold">YAML 預覽</span>
            <div class="d-flex flex-wrap align-items-center gap-2">
              <span id="helm-preview-read-at" class="badge text-bg-secondary">尚未讀取</span>
              <button id="helm-copy-btn" type="button" class="btn btn-sm btn-outline-secondary config-bound" disabled>複製 YAML</button>
              <button id="helm-download-btn" type="button" class="btn btn-sm btn-outline-secondary config-bound" disabled>下載 YAML</button>
              <span id="helm-preview-filename" class="badge text-bg-light">尚未讀取</span>
            </div>
          </div>
          <pre id="helm-preview" class="yaml-preview"># 點擊上方「讀取」載入 Helm values</pre>
        </div>

        <form id="helm-save-form" method="post" action="/api/configs/helm">
          <div class="mb-2"><textarea id="helm-save-content" class="form-control font-monospace config-bound" name="content" rows="14" placeholder="貼上 values 內容" disabled></textarea></div>
          <div class="d-flex align-items-center gap-2">
            <button id="helm-save-btn" class="btn btn-primary config-bound" disabled>儲存 values</button>
            <span id="helm-save-state" class="badge text-bg-secondary">尚未載入</span>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="col-12 col-xl-6">
    <div class="card shadow-sm h-100">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span>jmeter config</span>
        <span class="badge text-bg-light" data-env-badge>未選擇環境</span>
      </div>
      <div class="card-body">
        <div class="yaml-preview-wrapper mb-3">
          <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-2">
            <span class="fw-semibold">內容預覽</span>
            <div class="d-flex flex-wrap align-items-center gap-2">
              <span id="jmeter-preview-read-at" class="badge text-bg-secondary">尚未讀取</span>
              <button id="jmeter-copy-btn" type="button" class="btn btn-sm btn-outline-secondary config-bound" disabled>複製</button>
              <button id="jmeter-download-btn" type="button" class="btn btn-sm btn-outline-secondary config-bound" disabled>下載</button>
              <span id="jmeter-preview-filename" class="badge text-bg-light">尚未讀取</span>
            </div>
          </div>
          <pre id="jmeter-preview" class="yaml-preview"># 點擊上方「讀取」載入 jmeter config</pre>
        </div>

        <form id="jmeter-save-form" method="post" action="/api/configs/jmeter-env">
          <div class="mb-2"><textarea id="jmeter-save-content" class="form-control font-monospace config-bound" name="content" rows="14" placeholder="貼上 jmeter config 內容" disabled></textarea></div>
          <div class="d-flex align-items-center gap-2">
            <button id="jmeter-save-btn" class="btn btn-primary config-bound" disabled>儲存 jmeter config</button>
            <span id="jmeter-save-state" class="badge text-bg-secondary">尚未載入</span>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
  (() => {
    const nowTimeText = () => new Date().toLocaleString("zh-TW", { hour12: false });
    const escapeHtml = (text) => text
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;");

    const configLoadForm = document.getElementById("config-load-form");
    const configEnv = document.getElementById("config-env");
    const configLoadBtn = document.getElementById("config-load-btn");
    const configCurrentEnv = document.getElementById("config-current-env");
    const configBoundControls = Array.from(document.querySelectorAll(".config-bound"));
    const envBadges = Array.from(document.querySelectorAll("[data-env-badge]"));

    const state = {
      currentEnv: "",
    };

    const editors = [
      {
        key: "helm",
        filename: (env) => `${env}.yaml`,
        readApi: (env) => `/api/configs/helm?name=${encodeURIComponent(`${env}.yaml`)}`,
        saveApi: "/api/configs/helm",
        saveBody: (env, content) => new URLSearchParams({ name: `${env}.yaml`, content }),
        preview: document.getElementById("helm-preview"),
        previewFilename: document.getElementById("helm-preview-filename"),
        previewReadAt: document.getElementById("helm-preview-read-at"),
        saveForm: document.getElementById("helm-save-form"),
        saveContent: document.getElementById("helm-save-content"),
        saveBtn: document.getElementById("helm-save-btn"),
        saveState: document.getElementById("helm-save-state"),
        copyBtn: document.getElementById("helm-copy-btn"),
        downloadBtn: document.getElementById("helm-download-btn"),
        currentContent: "",
        baselineContent: "",
      },
      {
        key: "jmeter",
        filename: (env) => `jmeter.${env}.env`,
        readApi: (env) => `/api/configs/jmeter-env?env=${encodeURIComponent(env)}`,
        saveApi: "/api/configs/jmeter-env",
        saveBody: (env, content) => new URLSearchParams({ env, content }),
        preview: document.getElementById("jmeter-preview"),
        previewFilename: document.getElementById("jmeter-preview-filename"),
        previewReadAt: document.getElementById("jmeter-preview-read-at"),
        saveForm: document.getElementById("jmeter-save-form"),
        saveContent: document.getElementById("jmeter-save-content"),
        saveBtn: document.getElementById("jmeter-save-btn"),
        saveState: document.getElementById("jmeter-save-state"),
        copyBtn: document.getElementById("jmeter-copy-btn"),
        downloadBtn: document.getElementById("jmeter-download-btn"),
        currentContent: "",
        baselineContent: "",
      }
    ];

    function setConfigBoundEnabled(enabled) {
      configBoundControls.forEach((element) => {
        element.disabled = !enabled;
      });
    }

    function setCurrentEnv(env) {
      const text = env || "未選擇環境";
      envBadges.forEach((badge) => {
        badge.textContent = text;
      });
      configCurrentEnv.textContent = env ? `已鎖定：${env}` : "尚未鎖定環境";
    }

    function setEditorReadState(editor, className, text) {
      editor.previewReadAt.className = `badge ${className}`;
      editor.previewReadAt.textContent = text;
    }

    function setEditorSaveState(editor, className, text) {
      editor.saveState.className = `badge ${className}`;
      editor.saveState.textContent = text;
    }

    function refreshDirty(editor) {
      if (!state.currentEnv) {
        setEditorSaveState(editor, "text-bg-secondary", "尚未載入");
        return;
      }
      const dirty = (editor.saveContent.value || "") !== editor.baselineContent;
      setEditorSaveState(editor, dirty ? "text-bg-warning" : "text-bg-success", dirty ? "尚未儲存變更" : "已同步");
    }

    async function loadEditor(editor, env) {
      editor.preview.textContent = "讀取中...";
      editor.previewFilename.textContent = editor.filename(env);
      setEditorReadState(editor, "text-bg-warning", "讀取中");

      const response = await fetch(editor.readApi(env));
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      const data = await response.json();
      const content = data.content ?? "";
      editor.currentContent = content;
      editor.baselineContent = content;
      editor.preview.innerHTML = escapeHtml(content || "");
      editor.saveContent.value = content;
      editor.previewFilename.textContent = editor.filename(env);

      const modifiedAt = data.modified_at || nowTimeText();
      setEditorReadState(editor, "text-bg-success", `已更新 ${modifiedAt}`);
      refreshDirty(editor);
      return modifiedAt;
    }

    async function loadAll(env) {
      state.currentEnv = env;
      setCurrentEnv(env);
      setConfigBoundEnabled(true);
      configLoadBtn.disabled = true;

      const results = await Promise.allSettled(editors.map((editor) => loadEditor(editor, env)));
      const hasError = results.some((result) => result.status === "rejected");

      if (hasError) {
        results.forEach((result, index) => {
          if (result.status !== "rejected") {
            return;
          }
          const editor = editors[index];
          editor.preview.textContent = `讀取失敗：${result.reason?.message || "未知錯誤"}`;
          setEditorReadState(editor, "text-bg-danger", `失敗 ${nowTimeText()}`);
          setEditorSaveState(editor, "text-bg-danger", "讀取失敗");
        });
      }

      configLoadBtn.disabled = false;
    }

    editors.forEach((editor) => {
      editor.saveContent.addEventListener("input", () => refreshDirty(editor));

      editor.saveForm?.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!state.currentEnv) {
          setEditorSaveState(editor, "text-bg-danger", "請先讀取環境");
          return;
        }

        const content = editor.saveContent.value || "";
        editor.saveBtn.disabled = true;
        setEditorSaveState(editor, "text-bg-info", "儲存中...");

        try {
          const body = editor.saveBody(state.currentEnv, content);
          const response = await fetch(editor.saveApi, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
            body: body.toString()
          });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const data = await response.json();
          const modifiedAt = data.modified_at || nowTimeText();
          editor.currentContent = content;
          editor.baselineContent = content;
          editor.preview.innerHTML = escapeHtml(content || "");
          setEditorReadState(editor, "text-bg-success", `已更新 ${modifiedAt}`);
          refreshDirty(editor);
          setEditorSaveState(editor, "text-bg-success", `已儲存 ${modifiedAt}`);
        } catch (error) {
          setEditorSaveState(editor, "text-bg-danger", `儲存失敗：${error.message}`);
        } finally {
          editor.saveBtn.disabled = false;
        }
      });

      editor.copyBtn?.addEventListener("click", async () => {
        const content = editor.currentContent || editor.saveContent.value || "";
        if (!content) {
          editor.copyBtn.textContent = "無內容";
          setTimeout(() => {
            editor.copyBtn.textContent = editor.key === "helm" ? "複製 YAML" : "複製";
          }, 1200);
          return;
        }

        try {
          if (navigator.clipboard?.writeText) {
            await navigator.clipboard.writeText(content);
          } else {
            editor.saveContent.focus();
            editor.saveContent.select();
            document.execCommand("copy");
          }
          editor.copyBtn.textContent = "已複製";
        } catch (_error) {
          editor.copyBtn.textContent = "失敗";
        } finally {
          setTimeout(() => {
            editor.copyBtn.textContent = editor.key === "helm" ? "複製 YAML" : "複製";
          }, 1200);
        }
      });

      editor.downloadBtn?.addEventListener("click", () => {
        const content = editor.currentContent || editor.saveContent.value || "";
        if (!content) {
          editor.downloadBtn.textContent = "無內容";
          setTimeout(() => {
            editor.downloadBtn.textContent = editor.key === "helm" ? "下載 YAML" : "下載";
          }, 1200);
          return;
        }

        const filename = editor.filename(state.currentEnv || "config");
        const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);

        editor.downloadBtn.textContent = "已下載";
        setTimeout(() => {
          editor.downloadBtn.textContent = editor.key === "helm" ? "下載 YAML" : "下載";
        }, 1200);
      });
    });

    configLoadForm?.addEventListener("submit", async (event) => {
      event.preventDefault();
      const env = (configEnv.value || "").trim();
      if (!env) {
        return;
      }
      await loadAll(env);
    });

    setCurrentEnv("");
  })();
</script>
{% endblock %}
