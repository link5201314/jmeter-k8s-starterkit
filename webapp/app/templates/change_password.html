{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card shadow-sm">
      <div class="card-header">變更密碼</div>
      <div class="card-body">
        {% if message %}
        <div class="alert alert-success py-2">{{ message }}</div>
        {% endif %}
        {% if error %}
        <div class="alert alert-danger py-2">{{ error }}</div>
        {% endif %}

        <form method="post" action="/change-password" class="row g-3">
          <div class="col-12">
            <label class="form-label">舊密碼</label>
            <input type="password" class="form-control" name="old_password" required>
          </div>
          <div class="col-12">
            <label class="form-label">新密碼</label>
            <input type="password" class="form-control" name="new_password" required minlength="8">
          </div>
          <div class="col-12">
            <label class="form-label">確認新密碼</label>
            <input type="password" class="form-control" name="confirm_password" required minlength="8">
          </div>
          <div class="col-12">
            <button class="btn btn-primary" type="submit">更新密碼</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
