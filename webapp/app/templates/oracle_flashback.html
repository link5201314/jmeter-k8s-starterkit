{% extends "base.html" %}

{% block content %}
<div class="card shadow-sm mb-4">
  <div class="card-header">Oracle Flashback 資料庫還原</div>
  <div class="card-body">
    <form id="flashback-form" class="row g-3 align-items-end">
      <div class="col-md-4">
        <label class="form-label">環境</label>
        <select class="form-select" name="env" id="env-select" required>
          <option value="">-- 請選擇環境 --</option>
          <option value="lab">LAB</option>
          <option value="dr-prod">DR-PROD</option>
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label">PDB 名稱</label>
        <input class="form-control" name="pdb_name" id="pdb-name" placeholder="CDBC1" required>
      </div>
      <div class="col-md-4">
        <div class="d-grid gap-2">
          <button type="button" class="btn btn-info" id="query-rp-btn">查詢還原點</button>
          <button type="button" class="btn btn-secondary" id="check-process-btn">查詢還原進度</button>
        </div>
      </div>
    </form>

    <div class="mt-4">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <h6 class="mb-0">還原點清單</h6>
      </div>
      <div id="restore-point-empty" class="text-muted small">尚未查詢還原點</div>
      <div id="restore-point-list" class="list-group"></div>
    </div>
  </div>
</div>

<div class="card shadow-sm mb-4">
  <div class="card-header">建立還原點</div>
  <div class="card-body">
    <form id="create-rp-form" class="row g-3 align-items-end">
      <div class="col-md-8">
        <label class="form-label" for="create-restore-point">還原點名稱</label>
        <input class="form-control" name="restore_point" id="create-restore-point" placeholder="例：RP_20260327_153000" required>
      </div>
      <div class="col-md-4">
        <div class="d-grid">
          <button type="button" class="btn btn-primary" id="create-rp-btn">建立還原點</button>
        </div>
      </div>
    </form>
  </div>
</div>

<div class="card shadow-sm">
  <div class="card-header">執行結果</div>
  <div class="card-body">
    <ul class="nav nav-tabs mb-3" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" id="output-tab" data-bs-toggle="tab" data-bs-target="#output-pane" type="button" role="tab">輸出</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="error-tab" data-bs-toggle="tab" data-bs-target="#error-pane" type="button" role="tab">錯誤</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="status-tab" data-bs-toggle="tab" data-bs-target="#status-pane" type="button" role="tab">狀態</button>
      </li>
    </ul>
    <div class="tab-content">
      <div class="tab-pane fade show active" id="output-pane" role="tabpanel">
        <pre id="output-content" class="yaml-preview"># 尚未執行任何操作</pre>
      </div>
      <div class="tab-pane fade" id="error-pane" role="tabpanel">
        <pre id="error-content" class="yaml-preview"># 尚未執行任何操作</pre>
      </div>
      <div class="tab-pane fade" id="status-pane" role="tabpanel">
        <pre id="status-content" class="yaml-preview"># 尚未執行任何操作</pre>
      </div>
    </div>
  </div>
</div>

<script>
  (() => {
    const form = document.getElementById("flashback-form");
    const outputContent = document.getElementById("output-content");
    const errorContent = document.getElementById("error-content");
    const statusContent = document.getElementById("status-content");
    const restorePointList = document.getElementById("restore-point-list");
    const restorePointEmpty = document.getElementById("restore-point-empty");
    const createRestorePointInput = document.getElementById("create-restore-point");
    const MAX_HISTORY_ENTRIES = 50;
    const historyStore = {
      output: [],
      error: [],
      status: [],
    };

    const nowLabel = () => {
      return new Date().toLocaleString("zh-TW", { hour12: false });
    };

    const renderHistory = (entries) => {
      if (!entries.length) return "# 尚未執行任何操作";
      return entries.join("\n\n------------------------------------------------------------\n\n");
    };

    const appendHistory = (type, actionLabel, message, focusTab = false) => {
      const contentMap = {
        output: outputContent,
        error: errorContent,
        status: statusContent,
      };
      const tabMap = {
        output: "output-tab",
        error: "error-tab",
        status: "status-tab",
      };

      const { env, pdbName } = getBaseValues();
      const envLabel = env || "(未指定)";
      const pdbLabel = pdbName || "(未指定)";
      const entry = `[${nowLabel()}] ${actionLabel} | ENV=${envLabel} | PDB=${pdbLabel}\n${message || "(無內容)"}`;
      historyStore[type].unshift(entry);
      if (historyStore[type].length > MAX_HISTORY_ENTRIES) {
        historyStore[type].pop();
      }

      contentMap[type].textContent = renderHistory(historyStore[type]);
      if (focusTab) {
        document.getElementById(tabMap[type]).click();
      }
    };

    const toParams = (formData) => {
      const params = new URLSearchParams();
      for (const [k, v] of formData.entries()) {
        params.append(k, String(v || ""));
      }
      return params;
    };

    const showStatus = (actionLabel, message, focusTab = false) => {
      appendHistory("status", actionLabel, message, focusTab);
    };

    const showError = (actionLabel, message, focusTab = true) => {
      appendHistory("error", actionLabel, message, focusTab);
    };

    const showOutput = (actionLabel, message, focusTab = true) => {
      appendHistory("output", actionLabel, message, focusTab);
    };

    const getBaseValues = () => {
      return {
        env: (form.elements["env"].value || "").trim(),
        pdbName: (form.elements["pdb_name"].value || "").trim(),
      };
    };

    const buildBaseFormData = () => {
      const { env, pdbName } = getBaseValues();
      const fd = new FormData();
      fd.set("env", env);
      fd.set("pdb_name", pdbName);
      return fd;
    };

    const renderRestorePoints = (restorePoints) => {
      restorePointList.innerHTML = "";

      if (!Array.isArray(restorePoints) || restorePoints.length === 0) {
        restorePointEmpty.textContent = "查無還原點";
        restorePointEmpty.classList.remove("d-none");
        return;
      }

      restorePointEmpty.classList.add("d-none");
      for (const rp of restorePoints) {
        const item = document.createElement("div");
        item.className = "list-group-item d-flex justify-content-between align-items-center gap-3";

        const title = document.createElement("span");
        title.className = "fw-semibold";
        title.textContent = rp;

        const actionWrap = document.createElement("div");
        actionWrap.className = "d-flex gap-2";

        const restoreBtn = document.createElement("button");
        restoreBtn.type = "button";
        restoreBtn.className = "btn btn-sm btn-warning";
        restoreBtn.textContent = "執行還原";
        restoreBtn.addEventListener("click", async () => {
          if (!confirm(`確認要執行還原點 ${rp} 的 Flashback Restore 嗎？`)) {
            return;
          }
          const fd = buildBaseFormData();
          fd.set("restore_point", rp);
          const payload = await executeOperation(
            "/api/oracle-flashback/restore-rp",
            fd,
            `執行還原 (${rp})`
          );
          if (payload && payload.ok) {
            await queryRestorePoints("自動重新查詢還原點（還原後）", false);
          }
        });

        const deleteBtn = document.createElement("button");
        deleteBtn.type = "button";
        deleteBtn.className = "btn btn-sm btn-outline-danger";
        deleteBtn.textContent = "刪除還原點";
        deleteBtn.addEventListener("click", async () => {
          if (!confirm(`確認要刪除還原點 ${rp} 嗎？此操作無法復原。`)) {
            return;
          }
          const fd = buildBaseFormData();
          fd.set("restore_point", rp);
          const payload = await executeOperation(
            "/api/oracle-flashback/delete-rp",
            fd,
            `刪除還原點 (${rp})`
          );
          if (payload && payload.ok) {
            await queryRestorePoints("自動重新查詢還原點（刪除後）", false);
          }
        });

        actionWrap.appendChild(restoreBtn);
        actionWrap.appendChild(deleteBtn);
        item.appendChild(title);
        item.appendChild(actionWrap);
        restorePointList.appendChild(item);
      }
    };

    async function executeOperation(apiEndpoint, formData, actionLabel, focusTab = true) {
      try {
        showStatus(actionLabel, "執行中...", focusTab);
        
        const response = await fetch(apiEndpoint, {
          method: "POST",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8",
          },
          body: toParams(formData).toString(),
        });

        const payload = await response.json();
        
        if (!response.ok) {
          showError(actionLabel, payload.detail || `HTTP ${response.status}`, true);
          return null;
        }

        showOutput(actionLabel, payload.output || "(無輸出)", focusTab);
        if (payload.error) {
          showError(actionLabel, payload.error, true);
        }
        
        let statusMsg = `執行完成\n`;
        statusMsg += `動作: ${actionLabel}\n`;
        statusMsg += `成功: ${payload.ok ? "是" : "否"}\n`;
        statusMsg += `終止碼: ${payload.exit_code}\n`;
        if (payload.restore_points) {
          statusMsg += `還原點列表: ${payload.restore_points.join(", ")}\n`;
        }
        if (payload.in_progress !== undefined) {
          statusMsg += `還原進行中: ${payload.in_progress ? "是" : "否"}\n`;
        }
        showStatus(actionLabel, statusMsg, focusTab);
        return payload;
      } catch (error) {
        showError(actionLabel, `錯誤: ${error.message}`, true);
        return null;
      }
    }

    const validateBaseInputs = () => {
      const { env, pdbName } = getBaseValues();

      if (!env) {
        showError("輸入驗證", "請選擇環境", true);
        return false;
      }
      if (!pdbName) {
        showError("輸入驗證", "請輸入 PDB 名稱", true);
        return false;
      }

      return true;
    };

    const validateCreateInputs = () => {
      if (!validateBaseInputs()) {
        return false;
      }

      const restorePoint = createRestorePointInput.value.trim();
      if (!restorePoint) {
        showError("輸入驗證", "請輸入還原點名稱", true);
        return false;
      }

      return true;
    };

    const queryRestorePoints = async (actionLabel = "查詢還原點", focusTab = true) => {
      if (!validateBaseInputs()) return;

      const payload = await executeOperation(
        "/api/oracle-flashback/list-rp",
        buildBaseFormData(),
        actionLabel,
        focusTab
      );
      if (payload && payload.ok) {
        renderRestorePoints(payload.restore_points || []);
      }
    };

    // Button handlers
    document.getElementById("query-rp-btn").addEventListener("click", queryRestorePoints);

    document.getElementById("check-process-btn").addEventListener("click", async () => {
      if (!validateBaseInputs()) return;
      await executeOperation(
        "/api/oracle-flashback/check-process",
        buildBaseFormData(),
        "查詢還原進度"
      );
    });

    document.getElementById("create-rp-btn").addEventListener("click", async () => {
      if (!validateCreateInputs()) return;

      const fd = buildBaseFormData();
      fd.set("restore_point", createRestorePointInput.value.trim());
      const restorePoint = createRestorePointInput.value.trim();
      const payload = await executeOperation(
        "/api/oracle-flashback/create-rp",
        fd,
        `建立還原點 (${restorePoint})`
      );
      if (payload && payload.ok) {
        await queryRestorePoints("自動重新查詢還原點（建立後）", false);
      }
    });
  })();
</script>
{% endblock %}
