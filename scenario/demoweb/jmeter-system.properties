# 注意：此檔為 JMeter properties，請用 -q 或 -p 載入；-S 只會載入 Java system properties
jmeter.reportgenerator.overall_granularity=10000
jmeter.reportgenerator.apdex_satisfied_threshold=1000
jmeter.reportgenerator.apdex_tolerated_threshold=2000
mode=StrippedBatch
num_sample_threshold=100
time_threshold=60000
CookieManager.save.cookies=true
summariser.interval=30
aggregate_rpt_pct1=50
aggregate_rpt_pct2=75
aggregate_rpt_pct3=90