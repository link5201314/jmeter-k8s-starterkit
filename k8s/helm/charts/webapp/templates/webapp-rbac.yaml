apiVersion: v1
kind: ServiceAccount
metadata:
  name: jmeter-webapp
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jmeter-webapp-role
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec", "pods/attach", "services", "endpoints", "configmaps", "secrets", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jmeter-webapp-rb
subjects:
  - kind: ServiceAccount
    name: jmeter-webapp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: jmeter-webapp-role
