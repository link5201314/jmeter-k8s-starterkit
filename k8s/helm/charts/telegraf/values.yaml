global:
  imageRegistry: ""
  imagePullSecrets: []

image:
  repository: telegraf
  tag: "1.5.2"
  digest: ""
  pullPolicy: IfNotPresent

rbac:
  # Singleton strategy:
  # - Primary namespace: true (create ClusterRole/ClusterRoleBinding)
  # - Secondary namespaces: false (reuse existing cluster-scoped RBAC)
  createClusterScopedResources: true
  clusterRoleName: metrics-reader
  clusterRoleBindingName: telegraf-metrics-reader
