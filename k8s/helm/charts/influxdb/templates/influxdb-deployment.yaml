---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: influxdb
  name: influxdb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: influxdb
  template:
    metadata:
      labels:
        app: influxdb
    spec:
{{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
{{- range .Values.global.imagePullSecrets }}
        - name: {{ . }}
{{- end }}
{{- end }}
      containers:
        - envFrom:
            - secretRef:
                name: influxdb-creds
          image: "{{- if .Values.global.imageRegistry }}{{ .Values.global.imageRegistry }}/{{- end }}{{ .Values.image.repository }}{{- if .Values.image.digest }}@{{ .Values.image.digest }}{{- else }}:{{ .Values.image.tag }}{{- end }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          name: influxdb
{{- if .Values.initRetentionPolicy.enabled }}
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - /scripts/ensure-retention.sh
{{- end }}
          resources:
            requests:
              memory: "256Mi"
              cpu: "512m"
            limits:
              memory: "1024Mi"
              cpu: "2048m"
          volumeMounts:
            - mountPath: /var/lib/influxdb
              name: var-lib-influxdb
            - mountPath: /scripts
              name: influxdb-maintenance-scripts
              readOnly: true
      volumes:
        - name: var-lib-influxdb
          persistentVolumeClaim:
            claimName: influxdb-pvc
        - name: influxdb-maintenance-scripts
          configMap:
            name: influxdb-maintenance-scripts
            defaultMode: 0755
