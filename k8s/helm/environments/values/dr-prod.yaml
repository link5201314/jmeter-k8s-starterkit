global:
  imageRegistry: "bmcharbor.mgnt.mvdis.gov.tw"
  imagePullSecrets:
    - bmcharbor-auth
  master:
    enabled: false
    image:
      repository: qa_team/jmeter-k8s-jmeter-base
      tag: "5.6.3-ctg-2"
    resources:
      requests:
        memory: "21504Mi"
        cpu: "3000m"
      limits:
        memory: "28672Mi"
        cpu: "6000m"
  slave:
    enabled: false
    image:
      repository: qa_team/jmeter-k8s-jmeter-base
      tag: "5.6.3-ctg-2"
    resources:
      requests:
        memory: "3840Mi"
        cpu: "1000m"
      limits:
        memory: "5120Mi"
        cpu: "2000m"
  pvc:
    enabled: true
    storageClassName: nfs-client

influxdb:
  image:
    repository: qa_team/jmeter-k8s-influxdb
    tag: "1.8"
  pvc:
    size: 30Gi
  retentionDays: 14

cleaner:
  image:
    repository: qa_team/jmeter-k8s-kubectl
    tag: "20260310-1"
  cronjob:
    cleanupDelaySeconds: 30

report-server:
  image:
    repository: qa_team/jmeter-k8s-nginx
    tag: "1.25"
  ingress:
    host: jmeter-report-dr.mgnt.mvdis.gov.tw
    ingressClassName: kommander-traefik

telegraf:
  image:
    repository: qa_team/jmeter-k8s-telegraf
    tag: "1.5.2"

wiremock:
  image:
    repository: qa_team/jmeter-k8s-wiremock
    tag: "3.9.1-1"

grafana:
  image:
    repository: qa_team/jmeter-k8s-grafana
    tag: "7.3.3"
  ingress:
    host: jmeter-grafana-dr.mgnt.mvdis.gov.tw
    ingressClassName: kommander-traefik

webapp:
  enabled: true
  image:
    repository: qa_team/jmeter-k8s-webapp
    tag: "2026.06.16-090218-c46ca87-ui-sort"
    pullPolicy: Always
    useGlobalRegistry: true
  ingress:
    host: jmeter-web-dr.mgnt.mvdis.gov.tw
    ingressClassName: kommander-traefik
  scenarioPvc:
    enabled: true
    existingClaim: ""
    claimName: jmeter-webapp-scenario-pvc
    keepOnUninstall: true
    mountPath: /workspace/scenario
    accessModes:
      - ReadWriteMany
    size: 10Gi
    storageClassName: nfs-client
  dataPvc:
    enabled: true
    existingClaim: ""
    claimName: jmeter-webapp-data-pvc
    keepOnUninstall: true
    mountPath: /workspace/webapp/data
    accessModes:
      - ReadWriteMany
    size: 1Gi
    storageClassName: nfs-client
  bootstrapAdmin:
    existingSecret: jmeter-webapp-bootstrap-admin
    usernameKey: username
    passwordKey: password
    groupKey: group
  extraEnvFromConfigMap: jmeter-webapp-log-filter