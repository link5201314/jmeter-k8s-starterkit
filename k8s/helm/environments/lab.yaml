global:
  imageRegistry: ""
  imagePullSecrets: []
  master:
    enabled: false
  slave:
    enabled: false
  pvc:
    enabled: true

jmeter:
  hostAliases:
    - ip: 192.168.29.132
      hostnames:
        - sbdemo.example.com

grafana:
  ingress:
    host: grafana.example.com

report-server:
  ingress:
    host: report.example.com

wiremock:
  enabled: false

cleaner:
  enabled: true
  image:
    tag: "latest"
  cronjob:
    cleanupDelaySeconds: 30

webapp:
  enabled: true
  image:
    repository: docker.io/isaac0815/jmeter-webapp
    tag: "2026.04.28-oracle-flashback"
    pullPolicy: Always
    useGlobalRegistry: false
  ingress:
    host: jmeter-web.example.com
  scenarioPvc:
    enabled: true
    existingClaim: ""
    claimName: jmeter-webapp-scenario-pvc
    mountPath: /workspace/scenario
    accessModes:
      - ReadWriteMany
    size: 10Gi
    storageClassName: nfs-csi
  dataPvc:
    enabled: true
    existingClaim: ""
    claimName: jmeter-webapp-data-pvc
    mountPath: /workspace/webapp/data
    accessModes:
      - ReadWriteMany
    size: 1Gi
    storageClassName: nfs-csi
  bootstrapAdmin:
    existingSecret: jmeter-webapp-bootstrap-admin
    usernameKey: username
    passwordKey: password
    groupKey: group
  extraEnvFromConfigMap: jmeter-webapp-log-filter
