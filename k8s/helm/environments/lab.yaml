global:
  imageRegistry: ""
  imagePullSecrets: []
  master:
    enabled: false
  slave:
    enabled: false
  pvc:
    enabled: true

jmeter:
  hostAliases:
    - ip: 192.168.29.132
      hostnames:
        - sbdemo.example.com

grafana:
  ingress:
    host: grafana.example.com

report-server:
  ingress:
    host: report.example.com

wiremock:
  enabled: false

cleaner:
  enabled: true
  image:
    tag: "latest"
  cronjob:
    cleanupDelaySeconds: 30

webapp:
  enabled: true
  image:
    repository: docker.io/isaac0815/jmeter-webapp
    tag: "2026.03.11-offline2"
    pullPolicy: Always
    useGlobalRegistry: false
  ingress:
    host: jmeter-web.example.com
